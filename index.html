<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職涯地圖探索</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
       
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-363E7F2VPB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-363E7F2VPB');
    </script>
</head>
<body>
    <div id="app">
        <!-- Map View -->
        <div id="map-view" class="view active">
            <div class="map-container">
                <div class="base-map">
                    <!-- New Base Map Background -->
                    <img src="assets/base_map_landscape.png" class="map-bg" alt="Career Map Landscape">
                    
                    <div class="building-entity" style="top: 52%; left: 19%; width: 19%;" onclick="navigateTo('culture')">
                        <img src="assets/v2_b1_t.png" alt="企業大樓" class="blended-img" />
                        <div class="label-tag">🏢 企業文化大樓</div>
                    </div>
                    
                    <div class="building-entity" style="top: 23%; left: 16%; width: 19%;" onclick="navigateTo('quiz')">
                        <img src="assets/v2_b2_t.png" alt="咖啡廳" class="blended-img" />
                        <div class="label-tag">☕ 職缺測驗咖啡廳</div>
                    </div>
                    
                    <div class="building-entity" style="top: 20%; left: 42%; width: 16%;" onclick="navigateTo('story')">
                        <img src="assets/v2_b3_t.png" alt="展演場所" class="blended-img" />
                        <div class="label-tag">🎪 女力故事帳篷</div>
                    </div>
                    
                    <div class="building-entity" style="top: 21%; left: 68%; width: 18%;" onclick="navigateTo('units')">
                        <img src="assets/v2_b4_t.png" alt="遊樂園" class="blended-img" />
                        <div class="label-tag">🎡 事業體遊樂園</div>
                    </div>
                    
                    <div class="building-entity" style="top: 70%; left: 48%; width: 25%;" onclick="navigateTo('benefits')">
                        <img src="assets/v2_b5_t.png" alt="溫馨住家" class="blended-img" />
                        <div class="label-tag">🏡 員工福利專區</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Content Views -->
        <div id="content-view" class="view hidden">
            <header class="content-header">
                <button class="back-btn" onclick="navigateTo('map')">← 返回地圖</button>
                <h1 id="content-title">功能名稱</h1>
            </header>
            <main id="content-body" class="content-body">
                <!-- Content injected via JS -->
            </main>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
